<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>充电桩列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  <style>
    :root {
      --clr-dc: #ea580c;
      --clr-dc-bg: #fff7ed;
      --clr-dc-border: #fed7aa;
      --clr-ac: #16a34a;
      --clr-ac-bg: #f0fdf4;
      --clr-ac-border: #bbf7d0;
      --clr-primary: #3b82f6;
      --clr-primary-bg: #eff6ff;
      --clr-primary-border: #bfdbfe;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, "Noto Sans SC", "Noto Sans Thai", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; height: 100vh; overflow: hidden; }
    .app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar { width: 390px; flex-shrink: 0; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #e5e7eb; z-index: 10; }
    .sidebar-header { padding: 14px 16px 0; flex-shrink: 0; }
    .sidebar-heading { margin-bottom: 14px; }
    .sidebar-title { font-size: 20px; font-weight: 700; color: #111827; margin: 0 0 4px; }
    .sidebar-subtitle { font-size: 12px; color: #9ca3af; margin: 0; line-height: 1.5; }

    .brand-tabs { display: flex; gap: 6px; padding-bottom: 10px; overflow-x: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    .brand-tabs::-webkit-scrollbar { height: 4px; }
    .brand-tabs::-webkit-scrollbar-track { background: transparent; }
    .brand-tabs::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .brand-tabs::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .tab { flex: 0 0 72px; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 12px 4px 10px; border: 1.5px solid #e5e7eb; border-radius: 14px; background: #fff; cursor: pointer; transition: border-color .15s, background .15s; position: relative; }
    .tab:hover { border-color: #93c5fd; background: #f8faff; }
    .tab.active { border-color: var(--clr-primary); background: var(--clr-primary-bg); }
    .tab.active .tab-name { color: var(--clr-primary); }
    .tab.active .provider-count { color: var(--clr-primary); opacity: .75; }
    /* checkmark badge */
    .tab-check { display: none; position: absolute; top: 6px; right: 6px; width: 16px; height: 16px; border-radius: 50%; background: var(--clr-primary); align-items: center; justify-content: center; }
    .tab-check svg { display: block; }
    .tab.active .tab-check { display: flex; }
    /* logo / all icon */
    .tab-logo { width: 44px; height: 44px; object-fit: contain; }
    .tab-all-icon { width: 44px; height: 44px; border-radius: 12px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .tab.active .tab-all-icon { background: #dbeafe; }
    .tab-name { font-size: 11px; font-weight: 500; color: #374151; text-align: center; line-height: 1.2; }
    .provider-count { font-size: 11px; color: #98a2b3; line-height: 1; text-align: center; }
    /* brand filter bar */
    .brand-filter-bar { display: none; align-items: center; gap: 8px; padding: 6px 0 10px; }
    .brand-filter-bar.visible { display: flex; }
    .bfb-pills { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; flex-wrap: nowrap; overflow: hidden; }
    .bfb-pill { flex-shrink: 0; display: inline-flex; align-items: center; gap: 3px; padding: 4px 8px 4px 10px; border-radius: 20px; background: var(--clr-primary); color: #fff; font-size: 12px; font-weight: 500; cursor: pointer; transition: background .12s; }
    .bfb-pill:hover { background: #1d4ed8; }
    .bfb-pill-x { font-size: 13px; line-height: 1; opacity: .75; margin-left: 1px; }
    .bfb-count { flex-shrink: 0; font-size: 12px; color: #6b7280; white-space: nowrap; }
    .bfb-count strong { color: var(--clr-primary); font-weight: 600; }
    .bfb-clear { flex-shrink: 0; font-size: 12px; font-weight: 600; color: var(--clr-primary); background: none; border: none; cursor: pointer; padding: 4px 0; white-space: nowrap; }

    /* search panel */
    .search-panel { background: #fff; border: 1.5px solid #e8eaed; border-radius: 20px; box-shadow: 0 4px 16px rgba(0,0,0,.07); margin-bottom: 12px; padding: 14px; position: relative; }
    /* search input box */
    .sp-search-box { display: flex; align-items: center; gap: 10px; border: 1.5px solid #e8eaed; border-radius: 12px; padding: 11px 14px; transition: border-color .15s, background .15s; margin-bottom: 12px; }
    .sp-search-box:focus-within { border-color: var(--clr-primary); background: #f0f4ff; }
    .sp-search-box:focus-within .sp-search-icon path, .sp-search-box:focus-within .sp-search-icon circle { stroke: var(--clr-primary); }
    .sp-search-icon { flex-shrink: 0; transition: stroke .15s; }
    .sp-search-box input { flex: 1; border: none; outline: none; font-size: 14px; color: #111827; background: transparent; min-width: 0; }
    .sp-search-box input::placeholder { color: #b0b7c3; }
    .sp-search-clear { flex-shrink: 0; display: none; width: 18px; height: 18px; border: none; background: #c9cdd4; border-radius: 50%; color: #fff; font-size: 11px; line-height: 1; cursor: pointer; align-items: center; justify-content: center; padding: 0; }
    /* power row */
    .sp-power-row { display: flex; align-items: center; gap: 8px; }
    .sp-power-field { flex: 1; display: flex; align-items: center; gap: 6px; border: 1.5px solid #e8eaed; border-radius: 12px; padding: 11px 14px; position: relative; transition: border-color .15s; }
    .sp-power-field:focus-within { border-color: var(--clr-primary); }
    .sp-power-label { font-size: 13px; color: #b0b7c3; flex-shrink: 0; white-space: nowrap; }
    .sp-power-input { flex: 1; border: none; outline: none; font-size: 13px; color: #111827; background: transparent; min-width: 0; }
    .sp-power-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .sp-power-unit { font-size: 13px; color: var(--clr-primary); font-weight: 500; flex-shrink: 0; }
    .sp-power-sep { font-size: 16px; color: #c0c4cc; flex-shrink: 0; line-height: 1; }
    .sp-power-reset { flex-shrink: 0; border: none; background: none; font-size: 12px; color: var(--clr-primary); cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background .12s; }
    .sp-power-reset:hover { background: var(--clr-primary-bg); }
    /* preset dropdown */
    .sp-power-dropdown { display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1.5px solid #e5e7eb; border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,.12); z-index: 200; overflow: hidden; }
    .sp-power-dropdown.open { display: block; }
    .sp-dd-item { padding: 10px 14px; font-size: 13px; color: #374151; cursor: pointer; transition: background .1s; display: flex; align-items: center; justify-content: space-between; }
    .sp-dd-item:hover { background: #f0f4ff; color: var(--clr-primary); }
    .sp-dd-item.selected { color: var(--clr-primary); font-weight: 600; background: #f0f4ff; }
    .sp-dd-item .sp-dd-unit { font-size: 11px; color: #9ca3af; }

    .sort-bar { padding: 8px 0 10px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; }
    .sort-count { font-size: 12px; color: #9ca3af; }
    .sort-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px solid #e5e7eb; border-radius: 20px; background: #fff; font-size: 13px; color: #374151; cursor: pointer; }
    #listUpdatedHint { font-size: 11px; color: #9ca3af; opacity: 0; transition: opacity .5s; }


    .station-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }
    .station-list::-webkit-scrollbar { width: 4px; }
    .station-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    /* ── Card ── */
    .station-card { display: flex; gap: 10px; padding: 10px; border: 1px solid #f0f0f0; border-radius: 10px; background: #fff; margin-top: 8px; cursor: pointer; transition: background .12s, border-color .12s; position: relative; }
    .station-card:hover { background: #f9fafb; border-color: #e5e7eb; }
    .station-card.active { background: var(--clr-primary-bg); border: 1.5px solid var(--clr-primary); }
    .card-logo { width: 36px; height: 36px; border-radius: 8px; object-fit: contain; flex-shrink: 0; border: 1px solid #f3f4f6; padding: 2px; background: #fff; align-self: flex-start; margin-top: 2px; }
    .card-body { flex: 1; min-width: 0; }
    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 1px; }
    .card-brand { font-size: 11px; color: #9ca3af; font-weight: 500; }
    .card-dist  { font-size: 13px; font-weight: 600; color: #374151; flex-shrink: 0; }
    .card-name { font-size: 14px; font-weight: 700; color: #111827; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 2px; }
    .card-addr { font-size: 12px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .card-tags { display: flex; gap: 4px; margin-bottom: 5px; }
    .ctag { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 5px; font-size: 11px; font-weight: 500; }
    .ctag.dc { background: var(--clr-dc-bg); color: var(--clr-dc); }
    .ctag.ac { background: var(--clr-ac-bg); color: var(--clr-ac); }
    .ctag.roaming { background: #fef3c7; color: #b45309; }
    .ctag.volta { background: #e0f2fe; color: #0369a1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .card-summary { font-size: 11px; color: #6b7280; }
    .card-nav { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 7px; background: var(--clr-primary-bg); color: var(--clr-primary); border: none; cursor: pointer; text-decoration: none; transition: background .12s; flex-shrink: 0; }
    .card-nav:hover { background: #dbeafe; }
    .connector-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .connector-tag { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .connector-tag.dc { background: var(--clr-dc-bg); color: var(--clr-dc); border: 1px solid var(--clr-dc-border); }
    .connector-tag.ac { background: var(--clr-ac-bg); color: var(--clr-ac); border: 1px solid var(--clr-ac-border); }

    /* load more */
    .load-more-wrap { text-align: center; padding: 12px 0 4px; }
    .load-more-btn { padding: 7px 20px; border-radius: 20px; border: 1.5px solid #e5e7eb; background: #fff; font-size: 13px; color: #374151; cursor: pointer; transition: all .12s; }
    .load-more-btn:hover { border-color: var(--clr-primary); color: var(--clr-primary); background: var(--clr-primary-bg); }

    /* ── Map panel ── */
    .map-panel { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .map-controls { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; align-items: center; gap: 8px; z-index: 5; pointer-events: none; }
    .map-controls > * { pointer-events: auto; }
    .map-type-toggle { display: flex; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15); overflow: hidden; flex-shrink: 0; }
    .map-toggle { padding: 7px 14px; font-size: 13px; font-weight: 500; color: #374151; border: none; background: transparent; cursor: pointer; }
    .map-toggle.active { color: var(--clr-primary); font-weight: 700; box-shadow: inset 0 -2px 0 var(--clr-primary); }

    /* locate button */
    .locate-btn { position: absolute; bottom: 116px; right: 10px; width: 40px; height: 40px; border-radius: 8px; background: #fff; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.15); display: flex; align-items: center; justify-content: center; z-index: 5; transition: background .15s; }
    .locate-btn:hover { background: var(--clr-primary-bg); }
    .locate-btn:hover svg { stroke: var(--clr-primary); }
    .locate-btn.locating { animation: locatePulse 1s ease infinite; }
    @keyframes locatePulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    @keyframes markerPulse { 0%{transform:scale(.45);opacity:.95} 80%{transform:scale(2.2);opacity:0} 100%{transform:scale(2.2);opacity:0} }
    .pin-pulse { position: absolute; top: 50%; left: 50%; width: 52px; height: 52px; margin: -26px 0 0 -26px; border-radius: 50%; border: 2.5px solid var(--clr-primary); animation: markerPulse 2.2s ease-out infinite; pointer-events: none; }

    .gm-style .gm-style-iw-c { border-radius: 10px !important; padding: 0 !important; }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .gm-style .gm-style-iw-tc::after { display: none; }
    .popup-content { padding: 12px 14px; min-width: 180px; }
    .popup-brand { font-size: 10px; font-weight: 600; margin-bottom: 3px; }
    .popup-name { font-size: 13px; font-weight: 700; color: #111827; margin-bottom: 6px; line-height: 1.3; }
    .popup-addr { font-size: 11px; color: #6b7280; margin-bottom: 6px; }
    .popup-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .empty-state { text-align: center; padding: 40px 20px; color: #9ca3af; }
    .empty-state p { font-size: 14px; margin-top: 12px; }
    .pac-container { z-index: 9999 !important; }

    /* ── Detail panel ── */
    .detail-panel { position: absolute; top: 0; right: 0; bottom: 0; width: clamp(320px, 430px, calc(100% - 650px)); background: #fff; z-index: 20; isolation: isolate; display: flex; flex-direction: column; box-shadow: -4px 0 24px rgba(0,0,0,.12); transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); }
    .detail-panel.open { transform: translateX(0); }
    .detail-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }
    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    @keyframes detailFadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .detail-body-fade { animation: detailFadeIn .2s ease; }
    .detail-close { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border-radius: 50%; background: #f3f4f6; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #6b7280; transition: background .15s; }
    .detail-close:hover { background: #e5e7eb; color: #111827; }

    /* breadcrumb */
    .d-breadcrumb { display: flex; align-items: center; gap: 6px; padding: 9px 16px; background: var(--clr-primary-bg); font-size: 12px; color: var(--clr-primary); font-weight: 500; cursor: pointer; border-bottom: 1px solid var(--clr-primary-border); transition: background .12s; }
    .d-breadcrumb:hover { background: #dbeafe; }

    .d-top { display: flex; align-items: flex-start; gap: 14px; padding: 20px 52px 16px 16px; }
    .d-logo { width: 56px; height: 56px; border-radius: 14px; object-fit: contain; border: 1px solid #f3f4f6; padding: 4px; background: #fff; flex-shrink: 0; }
    .d-title { flex: 1; min-width: 0; padding-top: 2px; }
    .d-brand-label { font-size: 11px; font-weight: 500; margin-bottom: 5px; }
    .d-name { font-size: 17px; font-weight: 700; color: #111827; line-height: 1.3; margin: 0; }
    .d-addr-section { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px 16px; border-top: 1px solid #f3f4f6; }
    .d-addr-left { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .d-loc-row { display: flex; align-items: flex-start; gap: 7px; }
    .d-loc-text { font-size: 12px; color: #374151; line-height: 1.5; }
    .d-hours-text { font-size: 12px; color: #374151; }
    .d-hours-btn { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 10px; border: 1px solid #e5e7eb; background: #f9fafb; font-size: 12px; color: #374151; cursor: default; transition: border-color .12s, color .12s, background .12s; position: relative; user-select: none; }
    .d-hours-btn:hover { border-color: var(--clr-primary); color: var(--clr-primary); background: var(--clr-primary-bg); }
    @keyframes hoursPopIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .d-hours-popup { display: none; position: absolute; top: calc(100% + 8px); left: 0; min-width: 200px; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 8px 0; font-size: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 999; pointer-events: none; }
    .d-hours-popup::before { content:''; position:absolute; top:-5px; left:18px; width:9px; height:9px; background:#fff; border-left:1px solid #e5e7eb; border-top:1px solid #e5e7eb; transform:rotate(45deg); }
    .d-hours-btn:hover .d-hours-popup { display: block; animation: hoursPopIn .15s ease; }
    .d-hours-row { display: flex; align-items: center; gap: 0; padding: 5px 14px; }
    .d-hours-row:hover { background: #f9fafb; }
    .d-hours-day { width: 36px; flex-shrink: 0; font-weight: 600; color: #374151; }
    .d-hours-time { color: #6b7280; }
    .d-nav-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: 10px; background: var(--clr-primary); color: #fff; font-size: 13px; font-weight: 600; text-decoration: none; white-space: nowrap; transition: background .15s; }
    .d-nav-btn:hover { background: #2563eb; }
    .copy-coord-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 10px; border: 1px solid #e5e7eb; background: #f9fafb; font-size: 11px; color: #6b7280; cursor: pointer; transition: all .12s; }
    .copy-coord-btn:hover { border-color: var(--clr-primary); color: var(--clr-primary); background: var(--clr-primary-bg); }
    .copy-coord-btn.copied { border-color: var(--clr-ac); color: var(--clr-ac); background: var(--clr-ac-bg); }

    /* charger accordion */
    .d-charger-title { display: flex; align-items: center; gap: 7px; padding: 14px 16px 10px; border-top: 1px solid #f3f4f6; font-size: 15px; font-weight: 700; color: #111827; }
    .cu-card { margin: 0 12px 8px; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    .cu-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; background: #fff; user-select: none; transition: background .15s; }
    .cu-header:hover { background: #f9fafb; }
    .cu-bolt { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .cu-bolt.dc { background: var(--clr-dc-bg); }
    .cu-bolt.ac { background: var(--clr-ac-bg); }
    .cu-main { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
    .cu-label { font-size: 13px; font-weight: 700; color: #111827; }
    .cu-sep   { color: #d1d5db; }
    .cu-kw    { font-size: 12px; color: #6b7280; }
    .cu-id    { font-size: 11px; color: #9ca3af; white-space: nowrap; }
    .cu-chevron { color: #9ca3af; flex-shrink: 0; transition: transform .2s; }
    .cu-card.open .cu-chevron { transform: rotate(180deg); }
    .cu-body { display: none; border-top: 1px solid #f3f4f6; }
    .cu-card.open .cu-body { display: block; }
    .cu-guns-label { padding: 10px 14px 4px; font-size: 13px; font-weight: 600; color: #374151; }
    /* single-charger flat view */
    .cu-flat { margin: 0 12px 12px; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    .cu-flat-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: #f9fafb; border-bottom: 1px solid #f3f4f6; }

    /* connector table */
    .conn-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    .conn-table th { padding: 7px 8px; background: #f9fafb; font-weight: 600; color: #6b7280; text-align: center; border-bottom: 1px solid #f3f4f6; }
    .conn-table th.th-left { text-align: left; }
    .conn-table .th-time { font-size: 10px; font-weight: 400; color: #9ca3af; display: block; }
    .conn-table td { padding: 10px 8px; vertical-align: middle; border-bottom: 1px solid #f9fafb; }
    .conn-table tr:last-child td { border-bottom: none; }
    .td-pos  { font-size: 13px; font-weight: 600; color: #111827; width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .td-type { font-size: 12px; color: #374151; text-align: center; white-space: nowrap; }
    .td-kw   { font-size: 12px; color: #374151; text-align: center; white-space: nowrap; }
    .td-day  { font-size: 13px; font-weight: 600; color: #dc2626; text-align: center; white-space: nowrap; }
    .td-night{ font-size: 13px; font-weight: 600; color: var(--clr-primary); text-align: center; white-space: nowrap; }
    .td-dash { color: #d1d5db; text-align: center; }
    .d-footnote { padding: 10px 16px 16px; font-size: 11px; color: #9ca3af; border-top: 1px solid #f9fafb; }

    /* nearby */
    .d-nearby-section { border-top: 1px solid #f3f4f6; padding-bottom: 12px; }

<script>
// ── Brand config ──────────────────────────────────────────────────────────────
const BRANDS = {
  pea:       { label: 'PEA VOLTA',  short: 'PEA',       color: '#7C3AED', bg: '#f3e8ff', text: '#7C3AED', logo: 'img/pea.png' },
  ptt:       { label: 'PTT EV',     short: 'PTT EV',    color: '#1d4ed8', bg: '#dbeafe', text: '#1d4ed8', logo: 'img/ptt.png' },
  spark:     { label: 'Spark',      short: 'Spark',     color: '#ea580c', bg: '#fff7ed', text: '#ea580c', logo: 'img/spark.png' },
  igreen:    { label: 'iGreen',     short: 'iGreen',    color: '#16a34a', bg: '#dcfce7', text: '#16a34a', logo: 'img/igreen.png' },
  onecharge: { label: 'OneCharge',  short: 'OneCharge', color: '#0369a1', bg: '#e0f2fe', text: '#0369a1', logo: 'img/onecharge.png' },
};

// ── Normalize ─────────────────────────────────────────────────────────────────
function chargerTypeLabel(c) {
  const m = (c.model || '').toLowerCase();
  if (m.includes('chademo')) return (c.type === 'DC' ? 'DC ' : '') + 'CHAdeMO';
  if (m.includes('ccs2') || m.includes('ccs combo 2')) return 'DC CCS2';
  if (m.includes('ccs')) return 'DC CCS';
  if (m.includes('ac type 2') || m.includes('type 2')) return 'AC Type 2';
  if (m.includes('ac type 1') || m.includes('type 1')) return 'AC Type 1';
  if (c.type === 'DC') return 'DC 快充';
  return 'AC 慢充';
}

function normalizeStation(raw, brandKey) {
  let dc = 0, ac = 0, maxKw = 0, minKw = Infinity;
  let minPrice = Infinity, maxPrice = -Infinity;
  const connTypes = new Set();
  if (typeof raw.dc_total_heads === 'number') {
    dc = raw.dc_total_heads; ac = raw.ac_total_heads || 0;
  }
  (raw.chargers || []).forEach(c => {
    if (typeof raw.dc_total_heads !== 'number') {
      if (c.type === 'DC') dc += (c.heads || 1); else ac += (c.heads || 1);
    }
    if (c.kw) { maxKw = Math.max(maxKw, c.kw); minKw = Math.min(minKw, c.kw); }
    (c.connectors || []).forEach(conn => {
      if (conn.price_day != null) { minPrice = Math.min(minPrice, conn.price_day); maxPrice = Math.max(maxPrice, conn.price_day); }
    });
    const tl = chargerTypeLabel(c);
    if (tl.includes('CCS')) connTypes.add('CCS2');
    else if (tl.includes('CHAdeMO')) connTypes.add('CHAdeMO');
    else if (tl.includes('Type 2')) connTypes.add('Type 2');
    else if (tl === 'DC 快充' && !connTypes.size) connTypes.add('DC Fast');
  });
  let address = raw.address || null;
  if (!address && raw.district && raw.province) address = `${raw.district}, ${raw.province}`;
  else if (!address && raw.province) address = raw.province;
  minKw = minKw === Infinity ? 0 : minKw;
  minPrice = minPrice === Infinity ? null : minPrice;
  maxPrice = maxPrice === -Infinity ? null : maxPrice;
  const sourceLabels = Array.isArray(raw.source_labels) ? raw.source_labels : [];
  return { brand: brandKey, name: raw.name, lat: raw.lat, lon: raw.lon, address, province: raw.province || null, dc, ac, total: dc + ac, maxKw, minKw, minPrice, maxPrice, connTypes: [...connTypes], sourceLabels, _raw: raw };
}

let allStations = [];

// Called after decryption succeeds
function initData(datasets) {
  [['pea', datasets.pea||[]], ['ptt', datasets.ptt||[]], ['spark', datasets.spark||[]], ['igreen', datasets.igreen||[]], ['onecharge', datasets.onecharge||[]]].forEach(([brand, data]) => {
    data.forEach(raw => { if (raw.lat && raw.lon) allStations.push(normalizeStation(raw, brand)); });
  });
  document.getElementById('tabCount-all').textContent = `${allStations.length}`;
  Object.keys(BRANDS).forEach(bk => {
    const el = document.getElementById(`tabCount-${bk}`);
    if (el) el.textContent = `${allStations.filter(s => s.brand === bk).length}`;
  });
  loadGoogleMaps();
}

function loadGoogleMaps() {
  const s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyBUNkBBVjIJ8rq_klcc2dkDttE-7vVutT0&libraries=places,marker&callback=initMap&v=weekly&loading=async';
  s.async = true;
  document.head.appendChild(s);
}

// ── State ─────────────────────────────────────────────────────────────────────
const activeBrands = new Set();
let activeSearch = '', activeProvince = '', activeOrigIdx = -1;
let activePowerMin = 0, activePowerMax = 0;
let mapCenter = [13.7563, 100.5018];
let currentStations = [];
let listShown = 80;

// ── Haversine ─────────────────────────────────────────────────────────────────
function dist(lat1, lon1, lat2, lon2) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r, dLon = (lon2 - lon1) * r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r) * Math.cos(lat2*r) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}
function fmtDist(km) { return km < 1 ? Math.round(km*1000)+' m' : km.toFixed(1)+' km'; }

// ── Google Maps globals ───────────────────────────────────────────────────────
let gmap, clusterer, infoWindow;
const allMarkers = [];

// ── Cluster renderer ──────────────────────────────────────────────────────────
const clusterRenderer = {
  render({ count, position, markers }) {
    const brandCounts = {};
    markers.forEach(m => { if (m._brand) brandCounts[m._brand] = (brandCounts[m._brand] || 0) + 1; });
    const brands = Object.keys(brandCounts);
    const sz = count < 10 ? 42 : count < 100 ? 50 : 58;
    const fontSize = count < 10 ? 14 : count < 100 ? 13 : 11;
    const countStr = count > 999 ? '999+' : String(count);
    const BASE = `position:relative;width:${sz}px;height:${sz}px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;box-shadow:0 2px 10px rgba(0,0,0,.35);cursor:pointer;border:3px solid rgba(255,255,255,.92);`;
    const el = document.createElement('div');
    if (brands.length === 1) {
      const bk = brands[0];
      el.style.cssText = BASE + `background:${BRANDS[bk].color};`;
      el.innerHTML = `<img src="img/${bk}.png" style="width:${Math.round(sz*.38)}px;height:${Math.round(sz*.38)}px;object-fit:contain;border-radius:3px;flex-shrink:0;"><span style="color:#fff;font-size:${fontSize}px;font-weight:700;line-height:1;font-family:Inter,'Noto Sans SC','Noto Sans Thai',sans-serif;">${countStr}</span>`;
    } else {
      el.style.cssText = BASE + 'background:#1f2937;';
      el.innerHTML = `<span style="color:#fff;font-size:${fontSize+2}px;font-weight:700;line-height:1;font-family:Inter,'Noto Sans SC','Noto Sans Thai',sans-serif;">${countStr}</span>`;
      const tip = document.createElement('div');
      tip.style.cssText = 'position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:8px 10px;border-radius:8px;font-size:12px;white-space:nowrap;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);';
      tip.innerHTML = brands.sort((a,b) => brandCounts[b]-brandCounts[a]).map(bk =>
        `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;"><span style="width:8px;height:8px;border-radius:50%;background:${BRANDS[bk].color};flex-shrink:0;"></span><span style="flex:1;">${BRANDS[bk].short}</span><span style="font-weight:700;margin-left:14px;">${brandCounts[bk]}</span></div>`
      ).join('');
      el.addEventListener('mouseenter', () => { const h = el.parentElement; if (h) h.style.zIndex='99999'; el.appendChild(tip); });
      el.addEventListener('mouseleave', () => { const h = el.parentElement; if (h) h.style.zIndex=''; tip.parentNode && tip.remove(); });
    }
    return new google.maps.marker.AdvancedMarkerElement({ position, content: el, zIndex: 500 + count });
  }
};

// ── Marker element ────────────────────────────────────────────────────────────
function createMarkerEl(brandKey, active) {
  if (active) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block;';
    const pulse = document.createElement('div');
    pulse.className = 'pin-pulse';
    const img = document.createElement('img');
    img.src = `img/${brandKey}-address.png`;
    img.style.cssText = 'width:72px;height:auto;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55));';
    wrap.appendChild(pulse); wrap.appendChild(img);
    return wrap;
  }
  const img = document.createElement('img');
  img.src = `img/${brandKey}-address.png`;
  img.className = 'map-pin-img';
  img.style.cssText = 'width:52px;height:auto;filter:drop-shadow(0 3px 5px rgba(0,0,0,.35))';
  return img;
}

// ── Filter / render ───────────────────────────────────────────────────────────
function applyFilter() {
  const q = activeSearch.trim().toLowerCase();
  currentStations = allStations
    .map((s, i) => ({ ...s, _origIdx: i, distance: dist(mapCenter[0], mapCenter[1], s.lat, s.lon) }))
    .filter(s =>
      (activeBrands.size === 0 || activeBrands.has(s.brand)) &&
      (!activeProvince || s.province === activeProvince) &&
      (!q || s.name.toLowerCase().includes(q) || (s.address||'').toLowerCase().includes(q)) &&
      (!activePowerMin || s.maxKw === 0 || s.maxKw >= activePowerMin) &&
      (!activePowerMax || s.minKw <= activePowerMax)
    )
    .sort((a, b) => a.distance - b.distance);
}

function fullRender() {
  listShown = 80;
  applyFilter();
  if (clusterer) updateClusterer();
  renderList();
}

function softRender() {
  currentStations.forEach(s => { s.distance = dist(mapCenter[0], mapCenter[1], s.lat, s.lon); });
  currentStations.sort((a, b) => a.distance - b.distance);
  renderList();
  showListUpdated();
}

function updateClusterer() {
  clusterer.clearMarkers();
  const markers = allStations
    .map((s, i) => ({ s, i }))
    .filter(({ s }) =>
      (activeBrands.size === 0 || activeBrands.has(s.brand)) &&
      (!activeProvince || s.province === activeProvince) &&
      (!activePowerMin || s.maxKw === 0 || s.maxKw >= activePowerMin) &&
      (!activePowerMax || s.minKw <= activePowerMax)
    )
    .map(({ i }) => allMarkers[i])
    .filter(Boolean);
  clusterer.addMarkers(markers);
}

// ── List rendering ────────────────────────────────────────────────────────────
const LIST_LIMIT = 80;

function renderList() {
  const total = currentStations.length;
  document.getElementById('stationCount').textContent =
    total > listShown ? `${listShown} / ${total} 个` : `共 ${total} 个`;
  const list = document.getElementById('stationList');
  if (total === 0) {
    list.innerHTML = `<div class="empty-state"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>暂无符合条件的充电站</p></div>`;
    return;
  }
  const visible = currentStations.slice(0, listShown);
  const loadMoreHtml = total > listShown
    ? `<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMore()">显示更多（剩余 ${total - listShown} 个）</button></div>`
    : '';
  list.innerHTML = visible.map((s, rank) => buildCard(s, rank)).join('') + loadMoreHtml;
  list.querySelectorAll('.station-card').forEach(card => {
    card.addEventListener('click', () => selectStation(+card.dataset.rank, true));
  });
}

function loadMore() {
  listShown += LIST_LIMIT;
  renderList();
}

let _listHintTimer;
function showListUpdated() {
  const el = document.getElementById('listUpdatedHint');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(_listHintTimer);
  _listHintTimer = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

function buildCard(s, rank) {
  const b = BRANDS[s.brand];
  const isActive = s._origIdx === activeOrigIdx;
  const dcTag = s.dc ? `<span class="ctag dc">DC × ${s.dc}</span>` : '';
  const acTag = s.ac ? `<span class="ctag ac">AC × ${s.ac}</span>` : '';
  const sourceTags = (s.sourceLabels || []).map(lb =>
    lb === 'EV Roaming' ? `<span class="ctag roaming">EV Roaming</span>`
    : lb === 'PEA VOLTA' ? `<span class="ctag volta">PEA VOLTA</span>` : ''
  ).join('');
  const chargerCount = (s._raw.chargers || []).length || s.total;
  const kwPart = s.maxKw ? ` · 最大 ${s.maxKw} kW` : '';
  const addrHtml = s.address ? `<div class="card-addr">${escHtml(s.address)}</div>` : '';
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}`;
  return `<div class="station-card${isActive ? ' active' : ''}" data-rank="${rank}">
    <img class="card-logo" src="${b.logo}" alt="${b.short}">
    <div class="card-body">
      <div class="card-header"><span class="card-brand">${b.short}</span><span class="card-dist">${fmtDist(s.distance)}</span></div>
      <div class="card-name">${escHtml(s.name)}</div>
      ${addrHtml}
      <div class="card-tags">${dcTag}${acTag}${sourceTags}</div>
      <div class="card-footer">
        <span class="card-summary">${chargerCount} 个充电桩${kwPart}</span>
        <a class="card-nav" href="${navUrl}" target="_blank" onclick="event.stopPropagation()" title="导航">
          <img src="img/navigation.png" style="width:14px;height:14px;object-fit:contain;">
        </a>
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Brand filter bar ──────────────────────────────────────────────────────────
function updateBrandFilterBar() {
  const bar = document.getElementById('brandFilterBar');
  if (activeBrands.size === 0) { bar.classList.remove('visible'); bar.innerHTML = ''; return; }
  const total = allStations.filter(s => activeBrands.has(s.brand)).length;
  const pillsHtml = [...activeBrands].map(b =>
    `<span class="bfb-pill" onclick="removeBrand('${b}')">${escHtml(BRANDS[b].short)}<span class="bfb-pill-x">×</span></span>`
  ).join('');
  bar.innerHTML = `
    <div class="bfb-pills">${pillsHtml}<span class="bfb-count">共 <strong>${total.toLocaleString()}</strong> 个站点</span></div>
    <button class="bfb-clear" onclick="clearBrandFilter()">清除</button>`;
  bar.classList.add('visible');
}

function removeBrand(bk) {
  activeBrands.delete(bk);
  syncBrandTabStates();
  updateBrandFilterBar();
  activeOrigIdx = -1;
  fullRender();
  if (_detailStation) renderNearby(_nearbyRadius);
}

function clearBrandFilter() {
  activeBrands.clear();
  syncBrandTabStates();
  updateBrandFilterBar();
  activeOrigIdx = -1;
  fullRender();
  if (_detailStation) renderNearby(_nearbyRadius);
}

// ── Map hover tooltip ──────────────────────────────────────────────────────────
let _mouseX = 0, _mouseY = 0;
document.addEventListener('mousemove', e => { _mouseX = e.clientX; _mouseY = e.clientY; });

function showMapTooltip(s, x, y) {
  const b = BRANDS[s.brand];
  const dcTag = s.dc ? `<span class="ctag dc" style="font-size:10px;padding:2px 6px;">DC × ${s.dc}</span>` : '';
  const acTag = s.ac ? `<span class="ctag ac" style="font-size:10px;padding:2px 6px;">AC × ${s.ac}</span>` : '';
  const priceStr = s.minPrice != null
    ? (s.minPrice === s.maxPrice ? `฿${s.minPrice.toFixed(2)}/kWh` : `฿${s.minPrice.toFixed(2)} – ${s.maxPrice.toFixed(2)}/kWh`)
    : '';
  const kwStr = s.maxKw
    ? (s.minKw && s.minKw !== s.maxKw ? `${s.minKw} – ${s.maxKw} kW` : `最大 ${s.maxKw} kW`)
    : '';
  const tt = document.getElementById('map-tooltip');
  tt.innerHTML = `
    <div class="mtt-brand">${escHtml(b.label)}</div>
    <div class="mtt-name">${escHtml(s.name)}</div>
    <div class="mtt-tags">${dcTag}${acTag}</div>
    <div class="mtt-rows">
      ${priceStr ? `<div class="mtt-row"><span class="mtt-row-label"><svg viewBox="0 0 14 14" width="14" height="14"><circle cx="7" cy="7" r="6.5" fill="#F7912E"/><text x="7" y="11" text-anchor="middle" fill="#fff" font-size="8.5" font-weight="700" font-family="Arial,sans-serif">฿</text></svg></span><span class="mtt-row-val">${escHtml(priceStr)}</span></div>` : ''}
      ${kwStr ? `<div class="mtt-row"><span class="mtt-row-label"><svg viewBox="0 0 16 16" width="14" height="14"><path d="M9 2L4 9h5l-1 5 6-8H9l1-4z" fill="#F3AE17"/></svg></span><span class="mtt-row-val">${escHtml(kwStr)}</span></div>` : ''}
    </div>`;
  positionMapTooltip(x, y);
  tt.style.display = 'block';
}

function hideMapTooltip() {
  document.getElementById('map-tooltip').style.display = 'none';
}

function positionMapTooltip(x, y) {
  const tt = document.getElementById('map-tooltip');
  let left = x + 14, top = y - 10;
  tt.style.left = left + 'px'; tt.style.top = top + 'px';
  requestAnimationFrame(() => {
    const W = window.innerWidth, H = window.innerHeight;
    if (left + tt.offsetWidth > W - 8) tt.style.left = (x - tt.offsetWidth - 8) + 'px';
    if (top + tt.offsetHeight > H - 8) tt.style.top = (y - tt.offsetHeight - 8) + 'px';
  });
}

function setMarkerContent(marker, s, active) {
  const el = createMarkerEl(s.brand, active);
  el.addEventListener('mouseenter', () => showMapTooltip(s, _mouseX, _mouseY));
  el.addEventListener('mousemove', e => positionMapTooltip(e.clientX, e.clientY));
  el.addEventListener('mouseleave', hideMapTooltip);
  marker.content = el;
}

// ── Brand tabs 拖拽滚动 + 滚轮横滑 ───────────────────────────────────────────
(function () {
  const el = document.getElementById('brandTabs');
  let dragging = false, startX = 0, scrollLeft = 0, moved = false;

  el.addEventListener('mousedown', e => {
    dragging = true; moved = false;
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
    el.style.cursor = 'grabbing';
    el.style.scrollBehavior = 'auto';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.pageX - el.offsetLeft - startX;
    if (Math.abs(dx) > 4) moved = true;
    el.scrollLeft = scrollLeft - dx;
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    el.style.cursor = '';
    el.style.scrollBehavior = 'smooth';
  });
  // 阻止拖动后触发 tab 点击
  el.addEventListener('click', e => { if (moved) { e.stopImmediatePropagation(); moved = false; } }, true);

  // 鼠标滚轮横划
  el.addEventListener('wheel', e => {
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return; // 已是横向滚动则放行
    e.preventDefault();
    el.scrollLeft += e.deltaY;
  }, { passive: false });
})();

// 同步所有 tab 的 active 状态
function syncBrandTabStates() {
  document.querySelectorAll('#brandTabs .tab').forEach(t => {
    const b = t.dataset.brand;
    if (!b) return;
    t.classList.toggle('active', b === 'all' ? activeBrands.size === 0 : activeBrands.has(b));
  });
}


// ── Locate me ─────────────────────────────────────────────────────────────────
function locateMe() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('locateBtn');
  btn && btn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    pos => {
      btn && btn.classList.remove('locating');
      const { latitude: lat, longitude: lng } = pos.coords;
      mapCenter = [lat, lng];
      if (gmap) { gmap.panTo({ lat, lng }); gmap.setZoom(13); }
      softRender();
    },
    () => { btn && btn.classList.remove('locating'); }
  );
}

// ── Copy coords ───────────────────────────────────────────────────────────────
function copyCoords(lat, lon, btn) {
  const text = `${lat}, ${lon}`;
  const done = () => {
    if (!btn) return;
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制坐标'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(done).catch(() => done());
  } else {
    // HTTP / file:// fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    done();
  }
}

// ── Detail panel ──────────────────────────────────────────────────────────────
let _detailStation = null, _prevDetailStation = null;
let _nearbyRadius = 3, _nearbyCache = [], _radiusCircle = null;

function openDetail(s, fromNearby) {
  const b = BRANDS[s.brand];
  const raw = s._raw;
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}`;
  const chargers = raw.chargers || [];

  // breadcrumb
  const prevIdx = _prevDetailStation
    ? (_prevDetailStation._origIdx ?? allStations.findIndex(n => n === _prevDetailStation)) : -1;
  const breadcrumb = fromNearby && _prevDetailStation && prevIdx >= 0
    ? `<div class="d-breadcrumb" onclick="openDetailByIdx(${prevIdx},false)">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>
        返回 ${escHtml(_prevDetailStation.name)}
      </div>` : '';

  const PIN_SVG   = `<svg width="14" height="14" viewBox="0 0 16 16" fill="#9ca3af" style="flex-shrink:0;margin-top:1px"><path d="M8 1.5A4.5 4.5 0 0 0 3.5 6c0 3 4.5 8.5 4.5 8.5S12.5 9 12.5 6A4.5 4.5 0 0 0 8 1.5zm0 6a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>`;
  const HOURS_SVG = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#9ca3af" stroke-width="1.4" style="flex-shrink:0;margin-top:1px"><circle cx="8" cy="8" r="6"/><path d="M8 4.5v3.5l2.5 2"/></svg>`;
  let hoursInner = '';
  if (raw.hours) {
    if (raw.hours.includes(';')) {
      const entries = raw.hours.split(';').map(s => s.trim()).filter(Boolean);
      const popupRows = entries.map(e => {
        const colonIdx = e.indexOf(':');
        if (colonIdx === -1) return `<div class="d-hours-row"><span class="d-hours-time">${escHtml(e)}</span></div>`;
        const day = e.slice(0, colonIdx).trim();
        const time = e.slice(colonIdx + 1).trim();
        return `<div class="d-hours-row"><span class="d-hours-day">${escHtml(day)}</span><span class="d-hours-time">${escHtml(time)}</span></div>`;
      }).join('');
      hoursInner = `${HOURS_SVG}<button class="d-hours-btn">
        营业时间
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
        <div class="d-hours-popup">${popupRows}</div>
      </button>`;
    } else {
      hoursInner = `${HOURS_SVG}<span class="d-hours-text">${escHtml(raw.hours)}</span>`;
    }
  }

  const detailSourceTags = (s.sourceLabels || []).map(lb =>
    lb === 'EV Roaming' ? `<span class="ctag roaming" style="font-size:10px;padding:2px 6px;">EV Roaming</span>`
    : lb === 'PEA VOLTA' ? `<span class="ctag volta" style="font-size:10px;padding:2px 6px;">PEA VOLTA</span>` : ''
  ).join('');
  const topHtml = `<div class="d-top">
    <img class="d-logo" src="${b.logo}" alt="${b.short}">
    <div class="d-title">
      <div class="d-brand-label" style="color:${b.color}">${b.label}</div>
      <h3 class="d-name">${escHtml(s.name)}</h3>
      ${detailSourceTags ? `<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">${detailSourceTags}</div>` : ''}
    </div>
  </div>`;

  const addrHtml = `<div class="d-addr-section">
    <div class="d-addr-left">
      <div class="d-loc-row">${PIN_SVG}<span class="d-loc-text">${escHtml(s.address || '—')}</span></div>

        <button class="r-tab" id="customRadiusBtn" onclick="toggleCustomInput()">自定义</button>

    .filter(x => x.i !== _sIdx)
    .sort((a, b) => a.d - b.d);

function buildChargerList(chargers) {
  const title = `<div class="d-charger-title">充电桩列表（${chargers.length}）</div>`;

  // single charger → flat (no accordion)
  if (chargers.length === 1) {
    const c = chargers[0];
    const typeLabel = chargerTypeLabel(c), kw = c.kw ? `${c.kw} kW` : '—';
    const connCls = c.type === 'DC' ? 'dc' : 'ac';
    const boltColor = connCls === 'dc' ? 'var(--clr-dc)' : 'var(--clr-ac)';
    const boltSvg = `<svg width="14" height="14" viewBox="0 0 16 16" style="fill:${boltColor}"><path d="M9 2L4 9h5l-1 5 6-8H9l1-4z"/></svg>`;
    const headCount = (c.connectors && c.connectors.length) || c.heads || 1;
    return `${title}<div class="cu-flat">
      <div class="cu-flat-header">
        <div class="cu-bolt ${connCls}">${boltSvg}</div>
        <div class="cu-main"><span class="cu-label">${c.type||'AC'}-${headCount}</span><span class="cu-sep">·</span><span class="cu-kw">${kw}</span></div>
        <div class="cu-id">桩号：${escHtml(c.name||'—')}</div>
      </div>
      ${buildConnectorTable(c, typeLabel, kw)}
    </div>`;
  }

  // multiple → accordion
  const cards = chargers.map((c, idx) => {
    const typeLabel = chargerTypeLabel(c), kw = c.kw ? `${c.kw} kW` : '—';
    const connCls = c.type === 'DC' ? 'dc' : 'ac';
    const boltColor = connCls === 'dc' ? 'var(--clr-dc)' : 'var(--clr-ac)';
    const boltSvg = `<svg width="14" height="14" viewBox="0 0 16 16" style="fill:${boltColor}"><path d="M9 2L4 9h5l-1 5 6-8H9l1-4z"/></svg>`;
    const headCount = (c.connectors && c.connectors.length) || c.heads || 1;
    return `<div class="cu-card${idx===0?' open':''}" id="cu-${idx}">
      <div class="cu-header" onclick="toggleCU(${idx})">
        <div class="cu-bolt ${connCls}">${boltSvg}</div>
        <div class="cu-main"><span class="cu-label">${c.type||'AC'}-${headCount}</span><span class="cu-sep">·</span><span class="cu-kw">${kw}</span></div>
        <div class="cu-id">桩号：${escHtml(c.name||'—')}</div>
        <svg class="cu-chevron" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="cu-body">
        <div class="cu-guns-label">充电枪（${headCount}）</div>
        ${buildConnectorTable(c, typeLabel, kw)}
      </div>
    </div>`;
  });
  return `${title}<div style="padding:0 0 4px;">${cards.join('')}</div>`;
}

function buildConnectorTable(c, typeLabel, kw) {
  const conns = c.connectors;
  const hasPriceDay   = conns?.some(x => x.price_day   != null) ?? false;
  const hasPriceNight = conns?.some(x => x.price_night != null) ?? false;
  const dayTh   = hasPriceDay   ? `<th style="white-space:nowrap">白天价格<span class="th-time">(06:00–22:00)</span></th>` : '';
  const nightTh = hasPriceNight ? `<th style="white-space:nowrap">夜间价格<span class="th-time">(22:00–06:00)</span></th>` : '';
  const rows = conns && conns.length
    ? conns.map((conn, hi) => {
        const posLabel = conn.position || `枪口 ${String.fromCharCode(65+hi)}`;
        const cType = conn.type || typeLabel, cKw = conn.kw ? `${conn.kw} kW` : kw;
        const dayCell   = hasPriceDay   ? (conn.price_day   != null ? `<td class="td-day">฿ ${conn.price_day.toFixed(2)}</td>`   : `<td class="td-dash">—</td>`) : '';
        const nightCell = hasPriceNight ? (conn.price_night != null ? `<td class="td-night">฿ ${conn.price_night.toFixed(2)}</td>` : `<td class="td-dash">—</td>`) : '';
        return `<tr><td class="td-pos" title="${escHtml(posLabel)}">${escHtml(posLabel)}</td><td class="td-type">${escHtml(cType)}</td><td class="td-kw">${cKw}</td>${dayCell}${nightCell}</tr>`;
      }).join('')
    : Array.from({ length: c.heads || 1 }, (_, hi) => {
        const lbl = `枪口 ${String.fromCharCode(65+hi)}`;
        return `<tr><td class="td-pos" title="${lbl}">${lbl}</td><td class="td-type">${typeLabel}</td><td class="td-kw">${kw}</td></tr>`;
      }).join('');
  return `<table class="conn-table">
    <thead><tr><th class="th-left">枪口名称</th><th style="white-space:nowrap">接口类型</th><th style="white-space:nowrap">最大功率</th>${dayTh}${nightTh}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  setRadiusCircle(null, 0);
  _detailStation = null; _prevDetailStation = null; _nearbyCache = [];
}

function toggleCU(idx) { document.getElementById(`cu-${idx}`)?.classList.toggle('open'); }

// ── Custom radius inline ──────────────────────────────────────────────────────
function toggleCustomInput() {
  const wrap = document.getElementById('customRadiusWrap');
  const btn  = document.getElementById('customRadiusBtn');
  if (!wrap) return;
  const opening = !wrap.classList.contains('open');
  wrap.classList.toggle('open', opening);
  btn && btn.classList.toggle('active', opening);
  if (opening) { const inp = document.getElementById('customKmInput'); inp && (inp.value='', inp.focus()); }
}

function applyCustomRadius() {
  const val = parseFloat(document.getElementById('customKmInput')?.value || '');
  if (!isNaN(val) && val >= 0.5 && val <= 50) {
    const wrap = document.getElementById('customRadiusWrap');
    const btn  = document.getElementById('customRadiusBtn');
    wrap && wrap.classList.remove('open');
    btn  && btn.classList.remove('active');
    changeRadius(Math.round(val * 10) / 10);
  }
}

// ── Nearby ────────────────────────────────────────────────────────────────────
function setRadiusCircle(station, radiusKm) {
  if (_radiusCircle) { _radiusCircle.setMap(null); _radiusCircle = null; }
  if (!station || !gmap || !radiusKm) return;
  _radiusCircle = new google.maps.Circle({
    map: gmap, center: { lat: station.lat, lng: station.lon }, radius: radiusKm * 1000,
    fillColor: '#3b82f6', fillOpacity: 0.06, strokeColor: '#3b82f6', strokeOpacity: 0.35, strokeWeight: 1.5, clickable: false,
  });
}

function fitToRadius(station, radiusKm) {
  if (!gmap || !station || !radiusKm) return;
  const bounds = new google.maps.Circle({ center: { lat: station.lat, lng: station.lon }, radius: radiusKm * 1000 }).getBounds();
  const panelEl = document.getElementById('detailPanel');
  const rightPad = (panelEl && panelEl.classList.contains('open')) ? panelEl.offsetWidth + 20 : 20;
  gmap.fitBounds(bounds, { top: 60, right: rightPad, bottom: 30, left: 20 });
}

function renderNearby(radiusKm) {
  _nearbyRadius = radiusKm;
  document.querySelectorAll('.r-tab[data-km]').forEach(t => t.classList.toggle('active', +t.dataset.km === radiusKm));
  const titleEl = document.getElementById('nearbyTitle');
  if (titleEl) titleEl.textContent = `附近 ${radiusKm} 公里充电桩`;
  const nearby = _nearbyCache.filter(x => {
    if (x.d > radiusKm) return false;
    if (activeBrands.size > 0 && !activeBrands.has(x.n.brand)) return false;
    if (activePowerMin && x.n.maxKw > 0 && x.n.maxKw < activePowerMin) return false;
    if (activePowerMax && x.n.minKw > activePowerMax) return false;
    if (activeProvince && x.n.province !== activeProvince) return false;
    return true;
  });
  const el = document.getElementById('nearbyList');
  if (!el) return;
  const hasFilter = activePowerMin || activePowerMax || activeBrands.size > 0 || activeProvince;
  const hint = hasFilter ? `<div class="nearby-filter-hint">已应用搜索筛选条件</div>` : '';
  if (nearby.length === 0) {
    const nextKm = radiusKm < 3 ? 3 : radiusKm < 5 ? 5 : radiusKm < 10 ? 10 : null;
    const suggest = nextKm ? `<br><button class="nearby-suggest-btn" onclick="changeRadius(${nextKm})">查看 ${nextKm}km 范围 →</button>` : '';
    el.innerHTML = hint + `<div class="nearby-empty">${radiusKm}km 内暂无符合条件的充电站${suggest}</div>`;
    return;
  }
  el.innerHTML = hint + nearby.map(({ n, i, d }) => {
    const b = BRANDS[n.brand];
    const dcTag = n.dc ? `<span class="ctag dc" style="font-size:10px;padding:1px 6px;">DC</span>` : '';
    const acTag = n.ac ? `<span class="ctag ac" style="font-size:10px;padding:1px 6px;">AC</span>` : '';
    const srcTags = (n.sourceLabels || []).map(lb =>
      lb === 'EV Roaming' ? `<span class="ctag roaming" style="font-size:10px;padding:1px 6px;">EV Roaming</span>`
      : lb === 'PEA VOLTA' ? `<span class="ctag volta" style="font-size:10px;padding:1px 6px;">PEA VOLTA</span>` : ''
    ).join('');
    return `<div class="nearby-card" onclick="openDetailByIdx(${i},true)" onmouseenter="hoverNearby(${i})" onmouseleave="unhoverNearby(${i})">
      <img class="nearby-logo" src="${b.logo}" alt="${b.short}">
      <div class="nearby-body">
        <div class="nearby-name">${escHtml(n.name)}</div>
        <div class="nearby-meta">${dcTag}${acTag}${srcTags}${n.total?`<span>${n.total} 枪</span>`:''}${n.maxKw?`<span>${n.maxKw} kW</span>`:''}</div>
      </div>
      <div class="nearby-dist">${fmtDist(d)}</div>
    </div>`;
  }).join('');
}

function changeRadius(km) {
  if (!_detailStation) return;
  renderNearby(km); setRadiusCircle(_detailStation, km); fitToRadius(_detailStation, km);
}

function hoverNearby(origIdx) {
  const m = allMarkers[origIdx]; if (!m || !m.content) return;
  const img = m.content.tagName === 'IMG' ? m.content : m.content.querySelector('img');
  if (img) img.classList.add('map-pin-bounce');
  if (m.content.parentElement) m.content.parentElement.style.zIndex = '9000';
}
function unhoverNearby(origIdx) {
  const m = allMarkers[origIdx]; if (!m || !m.content) return;
  const img = m.content.tagName === 'IMG' ? m.content : m.content.querySelector('img');
  if (img) img.classList.remove('map-pin-bounce');
  if (m.content.parentElement) m.content.parentElement.style.zIndex = '';
}

function openDetailByIdx(origIdx, fromNearby) {
  const s = allStations[origIdx]; if (!s) return;
  _prevDetailStation = fromNearby ? _detailStation : null;
  if (activeOrigIdx >= 0 && allMarkers[activeOrigIdx]) {
    setMarkerContent(allMarkers[activeOrigIdx], allStations[activeOrigIdx], false);
    allMarkers[activeOrigIdx].zIndex = 0;
  }
  activeOrigIdx = origIdx;
  if (allMarkers[origIdx]) {
    setMarkerContent(allMarkers[origIdx], s, true);
    allMarkers[origIdx].zIndex = 999;
    if (gmap) gmap.panTo({ lat: s.lat, lng: s.lon });
  }
  openDetail(s, fromNearby);
}

// ── Select station ────────────────────────────────────────────────────────────
function selectStation(rank, flyTo) {
  const s = currentStations[rank]; if (!s) return;
  if (activeOrigIdx >= 0 && allMarkers[activeOrigIdx]) {
    setMarkerContent(allMarkers[activeOrigIdx], allStations[activeOrigIdx], false);
    allMarkers[activeOrigIdx].zIndex = 0;
  }
  activeOrigIdx = s._origIdx;
  _prevDetailStation = null;
  const m = allMarkers[s._origIdx];
  if (m) {
    setMarkerContent(m, s, true); m.zIndex = 999;
    if (flyTo) { gmap.panTo({ lat: s.lat, lng: s.lon }); if (gmap.getZoom() < 14) gmap.setZoom(14); }
  }
  openDetail(s, false);
}

function buildPopup(s, b) {
  const dcTag = s.dc ? `<span class="connector-tag dc" style="font-size:10px;padding:2px 6px;">⚡ DC×${s.dc}</span>` : '';
  const acTag = s.ac ? `<span class="connector-tag ac" style="font-size:10px;padding:2px 6px;">AC×${s.ac}</span>` : '';
  return `<div class="popup-content"><div class="popup-brand" style="color:${b.color}">${b.label}</div><div class="popup-name">${escHtml(s.name)}</div>${s.address?`<div class="popup-addr">${escHtml(s.address)}</div>`:''}<div class="popup-row">${dcTag}${acTag}</div></div>`;
}

// ── initMap ───────────────────────────────────────────────────────────────────
window.initMap = function () {
  gmap = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 13.7563, lng: 100.5018 }, zoom: 6, mapId: 'DEMO_MAP_ID',
    mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
    zoomControl: true, zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
    gestureHandling: 'greedy', clickableIcons: false,
  });

  infoWindow = new google.maps.InfoWindow({ maxWidth: 260 });

  clusterer = new markerClusterer.MarkerClusterer({
    map: gmap, markers: [],
    algorithm: new markerClusterer.SuperClusterAlgorithm({ radius: 80, maxZoom: 14, minPoints: 2 }),
    renderer: clusterRenderer,
    onClusterClick(_, cluster, map) {
      const panelEl = document.getElementById('detailPanel');
      const rightPad = (panelEl && panelEl.classList.contains('open')) ? panelEl.offsetWidth + 20 : 60;
      map.fitBounds(cluster.bounds, { top: 60, right: rightPad, bottom: 60, left: 60 });
    },
  });

  allStations.forEach((s, i) => {
    const marker = new google.maps.marker.AdvancedMarkerElement({
      position: { lat: s.lat, lng: s.lon },
    });
    setMarkerContent(marker, s, false);
    marker._brand = s.brand;
    marker.addListener('click', () => {
      const rank = currentStations.findIndex(cs => cs._origIdx === i);
      if (rank >= 0) { selectStation(rank, false); }
      else {
        if (activeOrigIdx >= 0 && allMarkers[activeOrigIdx]) {
          setMarkerContent(allMarkers[activeOrigIdx], allStations[activeOrigIdx], false);
          allMarkers[activeOrigIdx].zIndex = 0;
        }
        activeOrigIdx = i; _prevDetailStation = null;
        setMarkerContent(marker, s, true); marker.zIndex = 999;
        openDetail(s, false);
      }
    });
    allMarkers.push(marker);
  });

  document.getElementById('btnMap').onclick = () => { gmap.setMapTypeId('roadmap'); document.getElementById('btnMap').classList.add('active'); document.getElementById('btnSat').classList.remove('active'); };
  document.getElementById('btnSat').onclick = () => { gmap.setMapTypeId('hybrid'); document.getElementById('btnSat').classList.add('active'); document.getElementById('btnMap').classList.remove('active'); };


  // ── Sidebar search ────────────────────────────────────────────────────────────
  let sidebarTimer;
  const sidebarSearch = document.getElementById('sidebarSearch');
  const sidebarSearchClear = document.getElementById('sidebarSearchClear');
  sidebarSearch.addEventListener('input', e => {
    clearTimeout(sidebarTimer);
    const val = e.target.value;
    sidebarSearchClear.style.display = val ? 'flex' : 'none';
    sidebarTimer = setTimeout(() => { activeSearch = val; activeOrigIdx = -1; fullRender(); }, 300);
  });
  sidebarSearchClear.addEventListener('click', () => {
    sidebarSearch.value = ''; activeSearch = '';
    sidebarSearchClear.style.display = 'none';
    activeOrigIdx = -1; fullRender();
  });

  // ── Power filter ──────────────────────────────────────────────────────────────
  let pfTimer;
  const pfMinInput = document.getElementById('pfMinInput');
  const pfMaxInput = document.getElementById('pfMaxInput');
  const spMinDropdown = document.getElementById('spMinDropdown');
  const spMaxDropdown = document.getElementById('spMaxDropdown');
  const pfReset = document.getElementById('pfReset');

  function updatePfResetVisibility() {
    pfReset.style.display = (activePowerMin || activePowerMax) ? 'inline-block' : 'none';
  }

  function syncDdSelected(dropdown, val) {
    dropdown.querySelectorAll('.sp-dd-item').forEach(item => {
      item.classList.toggle('selected', +item.dataset.val === val);
    });
  }
  pfMinInput.addEventListener('focus', () => { spMinDropdown.classList.add('open'); syncDdSelected(spMinDropdown, activePowerMin); });
  pfMinInput.addEventListener('blur',  () => { setTimeout(() => spMinDropdown.classList.remove('open'), 150); });
  pfMaxInput.addEventListener('focus', () => { spMaxDropdown.classList.add('open'); syncDdSelected(spMaxDropdown, activePowerMax); });
  pfMaxInput.addEventListener('blur',  () => { setTimeout(() => spMaxDropdown.classList.remove('open'), 150); });

  spMinDropdown.querySelectorAll('.sp-dd-item').forEach(item => {
    item.addEventListener('mousedown', e => e.preventDefault());
    item.addEventListener('click', () => {
      const val = +item.dataset.val;
      activePowerMin = val; pfMinInput.value = val;
      syncDdSelected(spMinDropdown, val);
      spMinDropdown.classList.remove('open');
      updatePfResetVisibility();
      activeOrigIdx = -1; fullRender();
    });
  });
  spMaxDropdown.querySelectorAll('.sp-dd-item').forEach(item => {
    item.addEventListener('mousedown', e => e.preventDefault());
    item.addEventListener('click', () => {
      const val = +item.dataset.val;
      activePowerMax = val; pfMaxInput.value = val;
      syncDdSelected(spMaxDropdown, val);
      spMaxDropdown.classList.remove('open');
      updatePfResetVisibility();
      activeOrigIdx = -1; fullRender();
    });
  });

  pfMinInput.addEventListener('input', e => {
    clearTimeout(pfTimer);
    pfTimer = setTimeout(() => { activePowerMin = parseFloat(e.target.value) || 0; updatePfResetVisibility(); activeOrigIdx = -1; fullRender(); }, 400);
  });
  pfMaxInput.addEventListener('input', e => {
    clearTimeout(pfTimer);
    pfTimer = setTimeout(() => { activePowerMax = parseFloat(e.target.value) || 0; updatePfResetVisibility(); activeOrigIdx = -1; fullRender(); }, 400);
  });

  pfReset.addEventListener('click', () => {
    activePowerMin = 0; activePowerMax = 0;
    pfMinInput.value = ''; pfMaxInput.value = '';
    syncDdSelected(spMinDropdown, 0); syncDdSelected(spMaxDropdown, 0);
    updatePfResetVisibility();
    activeOrigIdx = -1; fullRender();
  });

  let idleTimer, lastSoftCenter = null;
  gmap.addListener('idle', () => {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      const c = gmap.getCenter(), newCenter = [c.lat(), c.lng()];
      if (lastSoftCenter && dist(lastSoftCenter[0], lastSoftCenter[1], newCenter[0], newCenter[1]) < 0.3) return;
      mapCenter = newCenter; lastSoftCenter = newCenter; softRender();
    }, 400);
  });


  document.getElementById('brandTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    const brand = btn.dataset.brand;
    if (!brand) return;
    if (brand === 'all') activeBrands.clear();
    else activeBrands.has(brand) ? activeBrands.delete(brand) : activeBrands.add(brand);
    syncBrandTabStates();
    updateBrandFilterBar();
    activeOrigIdx = -1; fullRender();
    if (_detailStation) renderNearby(_nearbyRadius);
  });

  fullRender();
  const bounds = new google.maps.LatLngBounds();
  allStations.forEach(s => bounds.extend({ lat: s.lat, lng: s.lon }));
  gmap.fitBounds(bounds, { padding: 60 });
};
</script>

<script>
(function () {
  // ── AES-256-GCM decrypt ──────────────────────────────────────────────────
  // File format: [salt(16) | iv(12) | ciphertext | authTag(16)]  base64

  async function deriveKey(password, salt) {
    const km = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
  }

  async function decryptFile(url, password) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('fetch ' + url);
    const raw = Uint8Array.from(atob((await res.text()).trim()), c => c.charCodeAt(0));
    const salt       = raw.slice(0, 16);
    const iv         = raw.slice(16, 28);
    const ciphertext = raw.slice(28);          // ciphertext || authTag
    const key        = await deriveKey(password, salt);
    const plain      = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
    return JSON.parse(new TextDecoder().decode(plain));
  }

  async function decryptAll(pwd) {
    const keys = ['ptt', 'pea', 'spark', 'igreen', 'onecharge'];
    const results = await Promise.all(keys.map(k => decryptFile(`data/${k}.enc`, pwd)));
    return Object.fromEntries(keys.map((k, i) => [k, results[i]]));
  }

  // ── Session cache (cleared on tab close) ────────────────────────────────
  const SK = '_chk';

  async function tryAuto() {
    const v = sessionStorage.getItem(SK);
    if (!v) return false;
    try {
      initData(await decryptAll(decodeURIComponent(atob(v))));
      hideOverlay();
      return true;
    } catch { sessionStorage.removeItem(SK); return false; }
  }

  function hideOverlay() {
    const el = document.getElementById('login-overlay');
    el.style.opacity = '0';
    setTimeout(() => el.style.display = 'none', 400);
  }

  // ── Eye toggle SVGs ──────────────────────────────────────────────────────
  const EYE_ON  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9ca3af" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke="#9ca3af" stroke-width="1.8"/></svg>`;
  const EYE_OFF = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round"/></svg>`;

  // ── Init ─────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    if (await tryAuto()) return;

    const overlay  = document.getElementById('login-overlay');
    overlay.style.display = 'flex';
    overlay.style.opacity = '1';

    const pwdInput = document.getElementById('loginPwd');
    const loginBtn = document.getElementById('loginBtn');
    const errorEl  = document.getElementById('loginError');
    const eyeBtn   = document.getElementById('loginEye');

    eyeBtn.addEventListener('click', () => {
      const show = pwdInput.type === 'password';
      pwdInput.type = show ? 'text' : 'password';
      eyeBtn.innerHTML = show ? EYE_OFF : EYE_ON;
    });

    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

    loginBtn.addEventListener('click', async () => {
      const pwd = pwdInput.value;
      if (!pwd) return;
      loginBtn.disabled = true;
      loginBtn.textContent = '验证中…';
      errorEl.textContent = '';
      try {
        const datasets = await decryptAll(pwd);
        sessionStorage.setItem(SK, btoa(encodeURIComponent(pwd)));
        initData(datasets);
        hideOverlay();
      } catch (e) {
        console.error('[login error]', e);
        errorEl.textContent = '密码错误，请重试 (' + (e?.message || e) + ')';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
        pwdInput.select();
      }
    });
  });
})();
</script>
